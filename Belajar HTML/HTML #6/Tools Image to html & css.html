<!DOCTYPE html>
<html>
    <head> 
        <!--<link rel="stylesheet" href=".cat.css">-->
        <style> 
            .cat {
            position: relative;
            width: 100px;
            height: 150px;
            }

            .body {
            position: absolute;
            top: 50px;
            left: 25px;
            width: 50px;
            height: 75px;
            background-color: #808080;
            border-radius: 25px;
            }

            .head {
            position: absolute;
            top: 0;
            left: 25px;
            width: 50px;
            height: 50px;
            background-color: #808080;
            border-radius: 25px;
            }

            .ear {
            position: absolute;
            top: -10px;
            width: 20px;
            height: 20px;
            background-color: #808080;
            border-radius: 10px;
            }

            .ear.left {
            left: 0;
            }

            .ear.right {
            right: 0;
            }

            .eye {
            position: absolute;
            top: 20px;
            width: 10px;
            height: 10px;
            background-color: green;
            border-radius: 5px;
            }

            .eye.left {
            left: 5px;
            }

            .eye.right {
            right: 5px;
            }

            .whisker {
            position: absolute;
            top: 30px;
            width: 20px;
            height: 2px;
            background-color: white;
            }

            .whisker.left {
            left: -20px;
            }

            .whisker.right {
            right: -20px;
            }

            .leg {
            position: absolute;
            width: 10px;
            height: 25px;
            background-color: #808080;
            }

            .leg.front.left {
            top: 50px;
            left: 10px;
            }

            .leg.front.right {
            top: 50px;
            right: 10px;
            }

            .leg.back.left {
            top: 90px;
            left: 10px;
            }

            .leg.back.right {
            top: 90px;
            right: 10px;
            }

            .tail {
            position: absolute;
            top: 75px;
            left: 75px;
            width: 25px;
            height: 25px;
            background-color: #808080;
            border-radius: 12.5px;
            transform: rotate(45deg);
            }
        </style>
    </head>
    <body>

        <div class="cat">
            <div class="body"></div>
            <div class="head">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="whisker left"></div>
                <div class="whisker right"></div>
            </div>
            <div class="leg front left"></div>
            <div class="leg front right"></div>
    <div class="leg back left"></div>
    <div class="leg back right"></div>
    <div class="tail"></div>
</div>

<img style="border: 2px solid #8bcdff;" src="Kucing UIIAUIIIIAI.png" height="20%" width="20%">
    </body>
</html>
